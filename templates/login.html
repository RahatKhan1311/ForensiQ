<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ForensiQ | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<div id="popupOverlay" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
  <div class="bg-slate-800 w-96 rounded-xl p-6 border border-slate-700 shadow-xl text-white">

    <h3 id="popupTitle" class="text-lg font-bold mb-3">Title</h3>

    <p id="popupMessage" class="text-gray-300 mb-4"></p>

    <input id="popupInput"
      class="w-full p-2 rounded bg-slate-700 hidden mb-4 outline-none"
      placeholder="Enter value" />

    <div class="flex justify-end gap-2">
      <button id="popupCancel"
        class="px-4 py-2 rounded bg-gray-600 hover:bg-gray-500 hidden">
        Cancel
      </button>

      <button id="popupOk"
        class="px-4 py-2 rounded bg-cyan-600 hover:bg-cyan-500 font-semibold">
        OK
      </button>
    </div>

  </div>
</div>

<body class="bg-slate-900 flex items-center justify-center min-h-screen text-white">

  <div class="bg-slate-800 p-8 rounded-xl w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <form id="loginForm" class="space-y-4">
      <input type="email" id="loginEmail" placeholder="Email"
        class="w-full p-2 rounded bg-slate-700 focus:outline-none" required />

      <div class="relative">
        <input type="password" id="loginPassword" placeholder="Password"
          class="w-full p-2 rounded bg-slate-700 focus:outline-none" required />
        <button type="button" id="toggleLoginPassword"
          class="absolute right-2 top-2 text-sm text-gray-400">Show</button>
      </div>

      <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 p-2 rounded font-semibold">
        Login
      </button>
    </form>

    <p class="text-center mt-4 text-sm">
      Don’t have an account?
      <a href="/signup" class="text-blue-400">Signup</a>
    </p>
  </div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
